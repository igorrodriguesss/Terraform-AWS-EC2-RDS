name: CI/CD Flask App

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login no ECR
        run: |
          aws ecr get-login-password --region us-east-1 \
          | docker login --username AWS \
          --password-stdin <account_id>.dkr.ecr.us-east-1.amazonaws.com

      - name: Build da imagem
        run: docker build -t flaskapp:latest .

      - name: Tag da imagem
        run: docker tag flaskapp:latest <account_id>.dkr.ecr.us-east-1.amazonaws.com/flask-app:latest

      - name: Push para ECR
        run: docker push <account_id>.dkr.ecr.us-east-1.amazonaws.com/flask-app:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push   # <- garante que só roda depois
    steps:
      - name: Executar Ansible para deploy
        run: |
          ansible-playbook -i ansible/hosts.ini ansible/deploy.yml
