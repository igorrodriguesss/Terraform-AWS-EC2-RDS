- name: Atualizar pacotes
  apt:
    update_cache: yes

- name: Instalar pacotes necessários
  apt:
    name:
      - python3-dev
      - python3-pip
      - build-essential
      - libssl-dev
      - libffi-dev
      - libmysqlclient-dev
      - pkg-config
      - mysql-client
    state: present

- name: Instalar pacotes Python via pip
  pip:
    name:
      - Flask==2.3.3
      - PyMySQL==1.1.1
      - cryptography==43.0.3
      - wtforms
      - passlib
    executable: pip3
    extra_args: --break-system-packages